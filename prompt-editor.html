<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロンプト作成・編集ページ for Prompt Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .hide { display: none !important; }
    </style>
</head>
<body class="text-gray-800 p-6 max-w-5xl mx-auto font-sans">

    <header class="mb-8">
        <h1 class="text-3xl font-bold text-blue-600 mb-2">プロンプト作成・編集ページ for Prompt Storage</h1>
        <p class="text-gray-600">
            本ページではandroid端末向けアプリ「Prompt Storage」用にインポートするプロンプトデータ（JSON）を作成・編集することができます。
        </p>
    </header>

    <div class="bg-white p-6 rounded-lg shadow-md mb-8 flex flex-col sm:flex-row gap-4 items-center justify-between">
        <div class="flex gap-4 items-center w-full sm:w-auto">
            <button id="btn-new" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded">
                📄 新規作成
            </button>
            <span class="text-gray-400">または</span>
            <label class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded cursor-pointer">
                📁 JSONを読み込む
                <input type="file" id="file-input" accept=".json" class="hidden">
            </label>
        </div>
        <div>
            <button id="btn-export" class="bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 px-6 rounded hide">
                💾 保存（ダウンロード）
            </button>
        </div>
    </div>

    <div id="editor-section" class="hide space-y-8">
        
        <section class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">1. カテゴリ設定</h2>
            <div id="categories-container" class="flex flex-wrap gap-2 mb-4"></div>
            <button id="btn-add-category" class="text-sm bg-gray-200 hover:bg-gray-300 py-1 px-3 rounded">+ カテゴリ追加</button>
        </section>

        <section class="bg-white p-6 rounded-lg shadow-md">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-xl font-bold">2. カスタム変数設定</h2>
                <button id="btn-add-var" class="text-sm bg-blue-100 text-blue-700 hover:bg-blue-200 py-1 px-3 rounded">+ 変数追加</button>
            </div>
            <div id="variables-container" class="space-y-3"></div>
        </section>

        <section class="bg-white p-6 rounded-lg shadow-md">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-xl font-bold">3. プロンプト一覧</h2>
                <button id="btn-add-prompt" class="text-sm bg-blue-500 text-white hover:bg-blue-600 py-1 px-3 rounded">+ プロンプト追加</button>
            </div>
            <div id="prompts-container" class="space-y-6"></div>
        </section>

    </div>

    <script>
        // --- データのひな形 ---
        const emptyData = {
            version: 2,
            exported_at: "",
            categories: ["未分類"],
            prompts: [],
            custom_variables: []
        };

        let appData = null; // 現在編集中のデータ

        // --- DOM要素の取得 ---
        const btnNew = document.getElementById('btn-new');
        const fileInput = document.getElementById('file-input');
        const btnExport = document.getElementById('btn-export');
        const editorSection = document.getElementById('editor-section');
        
        const catContainer = document.getElementById('categories-container');
        const varContainer = document.getElementById('variables-container');
        const promptsContainer = document.getElementById('prompts-container');

        // --- イベントリスナー（ファイル操作） ---
        btnNew.addEventListener('click', () => {
            appData = JSON.parse(JSON.stringify(emptyData)); // ディープコピー
            initEditor();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    appData = JSON.parse(event.target.result);
                    // 必須フィールドの補完（古いバージョン対策など）
                    if(!appData.categories) appData.categories = ["未分類"];
                    if(!appData.prompts) appData.prompts = [];
                    if(!appData.custom_variables) appData.custom_variables = [];
                    initEditor();
                } catch (err) {
                    alert('JSONファイルの読み込みに失敗しました。形式が正しいか確認してください。');
                }
            };
            reader.readAsText(file);
            e.target.value = ""; // 同じファイルを再度選べるようにリセット
        });

        btnExport.addEventListener('click', () => {
            if (!appData) return;
            
            // エクスポート日時を更新
            const now = new Date();
            // JSTに合わせたISOライクなフォーマットにする場合
            appData.exported_at = now.toISOString().replace('Z', '');

            const jsonStr = JSON.stringify(appData, null, 2); // 見やすくフォーマット
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `prompt_storage_export_${now.getTime()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });

        // --- エディタ初期化処理 ---
        function initEditor() {
            editorSection.classList.remove('hide');
            btnExport.classList.remove('hide');
            renderCategories();
            renderVariables();
            renderPrompts();
        }

        // --- カテゴリのレンダリング ---
        function renderCategories() {
            catContainer.innerHTML = '';
            appData.categories.forEach((cat, index) => {
                const div = document.createElement('div');
                div.className = "flex items-center bg-gray-100 rounded px-2 py-1";
                div.innerHTML = `
                    <input type="text" value="${cat}" class="bg-transparent outline-none text-sm w-32" onchange="updateCategory(${index}, this.value)">
                    <button onclick="removeCategory(${index})" class="ml-2 text-red-400 hover:text-red-600 font-bold">×</button>
                `;
                catContainer.appendChild(div);
            });
        }
        window.updateCategory = (idx, val) => {
            appData.categories[idx] = val;
            renderPrompts(); // プロンプト内のセレクトボックスも更新するため
        };
        window.removeCategory = (idx) => {
            appData.categories.splice(idx, 1);
            if(appData.categories.length === 0) appData.categories.push("未分類"); // 最低1つは残す
            renderCategories();
            renderPrompts();
        };
        document.getElementById('btn-add-category').addEventListener('click', () => {
            appData.categories.push("新規カテゴリ");
            renderCategories();
            renderPrompts();
        });

        // --- カスタム変数のレンダリング ---
        function renderVariables() {
            varContainer.innerHTML = '';
            if (appData.custom_variables.length === 0) {
                varContainer.innerHTML = '<p class="text-sm text-gray-500">変数は登録されていません。</p>';
                return;
            }
            appData.custom_variables.forEach((v, index) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-2 bg-gray-50 p-2 rounded border";
                div.innerHTML = `
                    <div class="flex-1">
                        <label class="text-xs text-gray-500">変数名</label>
                        <input type="text" value="${v.name}" class="w-full border rounded px-2 py-1 text-sm" onchange="updateVar(${index}, 'name', this.value)">
                    </div>
                    <div class="flex-1">
                        <label class="text-xs text-gray-500">オプション (カンマ区切り等)</label>
                        <input type="text" value="${v.options}" class="w-full border rounded px-2 py-1 text-sm" onchange="updateVar(${index}, 'options', this.value)">
                    </div>
                    <div class="pt-4">
                        <button onclick="removeVar(${index})" class="bg-red-100 text-red-600 hover:bg-red-200 px-3 py-1 rounded text-sm">削除</button>
                    </div>
                `;
                varContainer.appendChild(div);
            });
        }
        window.updateVar = (idx, field, val) => { appData.custom_variables[idx][field] = val; };
        window.removeVar = (idx) => { appData.custom_variables.splice(idx, 1); renderVariables(); };
        document.getElementById('btn-add-var').addEventListener('click', () => {
            const newId = appData.custom_variables.length > 0 ? Math.max(...appData.custom_variables.map(v => v.id)) + 1 : 1;
            appData.custom_variables.push({ id: newId, name: "新規変数", options: "" });
            renderVariables();
        });

        // --- プロンプトのレンダリング ---
        function renderPrompts() {
            promptsContainer.innerHTML = '';
            if (appData.prompts.length === 0) {
                promptsContainer.innerHTML = '<p class="text-sm text-gray-500">プロンプトは登録されていません。</p>';
                return;
            }
            
            // カテゴリのオプション用HTMLを生成
            const catOptionsHTML = appData.categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');

            appData.prompts.forEach((prompt, index) => {
                const div = document.createElement('div');
                div.className = "bg-gray-50 p-4 rounded-lg border border-gray-200 relative";
                
                // お気に入りチェックボックス
                const favChecked = prompt.isFavorite === 1 ? 'checked' : '';

                div.innerHTML = `
                    <div class="absolute top-4 right-4">
                        <button onclick="removePrompt(${index})" class="text-red-500 hover:text-red-700 font-bold text-sm bg-red-50 px-2 py-1 rounded">削除</button>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4 pr-16">
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1">タイトル</label>
                            <input type="text" value="${prompt.title}" class="w-full border rounded px-2 py-1" onchange="updatePrompt(${index}, 'title', this.value)">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1">カテゴリ</label>
                            <select class="w-full border rounded px-2 py-1" onchange="updatePrompt(${index}, 'category', this.value)">
                                ${appData.categories.map(c => `<option value="${c}" ${c === prompt.category ? 'selected' : ''}>${c}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1">タグ (スペース区切り)</label>
                            <input type="text" value="${prompt.tags}" class="w-full border rounded px-2 py-1" onchange="updatePrompt(${index}, 'tags', this.value)">
                        </div>
                        <div class="flex items-center pt-5">
                            <label class="flex items-center cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 text-blue-600" ${favChecked} onchange="updatePromptFav(${index}, this.checked)">
                                <span class="ml-2 text-sm text-gray-700">お気に入り (★)</span>
                            </label>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">プロンプト内容</label>
                        <textarea class="w-full border rounded px-2 py-2 h-32 font-mono text-sm" onchange="updatePrompt(${index}, 'content', this.value)">${prompt.content}</textarea>
                    </div>
                `;
                promptsContainer.appendChild(div);
            });
        }
        window.updatePrompt = (idx, field, val) => { appData.prompts[idx][field] = val; };
        window.updatePromptFav = (idx, isChecked) => { appData.prompts[idx].isFavorite = isChecked ? 1 : 0; };
        window.removePrompt = (idx) => { 
            if(confirm('このプロンプトを削除してもよろしいですか？')) {
                appData.prompts.splice(idx, 1); 
                renderPrompts(); 
            }
        };
        document.getElementById('btn-add-prompt').addEventListener('click', () => {
            const newId = appData.prompts.length > 0 ? Math.max(...appData.prompts.map(p => p.id)) + 1 : 1;
            const defaultCat = appData.categories.length > 0 ? appData.categories[0] : "未分類";
            appData.prompts.unshift({ // 新しいものは一番上に追加
                id: newId, 
                title: "新規プロンプト", 
                category: defaultCat, 
                tags: "", 
                content: "", 
                isFavorite: 0, 
                usage_count: 0 
            });
            renderPrompts();
        });

    </script>
</body>
</html>
